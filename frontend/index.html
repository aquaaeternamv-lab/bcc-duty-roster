<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#fafaf7" />
<title>BCC — Duty & Roster</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  /* BCC palette — neutrals subtly tinted toward brand blue (impeccable: no pure grays) */
  --bg:           oklch(98.5% 0.005 240);   /* near-white, faint blue tint */
  --bg-tint:      oklch(96.2% 0.008 240);
  --surface:      #ffffff;
  --surface-2:    oklch(98.8% 0.004 240);
  --border:       oklch(92.5% 0.008 240);
  --border-strong:oklch(85% 0.012 240);

  --text:         oklch(22% 0.025 240);     /* dark navy, not pure black */
  --text-2:       oklch(38% 0.022 240);
  --muted:        oklch(58% 0.018 240);
  --faint:        oklch(72% 0.014 240);

  /* Primary = BCC blue from the logo */
  --accent: #1f74c4;
  --accent-soft: #e6f0fb;
  --accent-strong: #155a9c;

  /* Brand multi-colour set from the BCC logo mark */
  --bcc-red: #e63946;
  --bcc-red-soft: #fde7e9;
  --bcc-yellow: #f4c430;
  --bcc-yellow-soft: #fdf4d3;
  --bcc-blue: #1f74c4;
  --bcc-blue-soft: #e6f0fb;
  --bcc-green: #5ba642;
  --bcc-green-soft: #ebf5e6;

  /* Status (mapped to brand where it makes sense) */
  --green: #5ba642;
  --red: #e63946;
  --amber: #d4a017;
  --blue: #1f74c4;
  --gold: #d4a017;
  --gold-soft: #fdf4d3;

  --shadow-sm: 0 1px 2px rgba(15,23,42,.04), 0 1px 1px rgba(15,23,42,.03);
  --shadow: 0 1px 3px rgba(15,23,42,.05), 0 4px 12px rgba(15,23,42,.04);
  --shadow-lg: 0 4px 16px rgba(15,23,42,.06), 0 24px 48px rgba(15,23,42,.10);

  --radius-sm: 6px;
  --radius: 10px;
  --radius-lg: 16px;

  /* Motion tokens — Emil's principles: ease-out, under 300ms */
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);    /* strong ease-out, instant feedback */
  --ease-out-soft: cubic-bezier(0.32, 0.72, 0, 1); /* spring-feel without bounce */
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1); /* subtle overshoot */
  --t: var(--ease-out);
  --tt: 180ms var(--ease-out);
  --t-press: 100ms var(--ease-out);
  --t-modal: 220ms var(--ease-out-soft);
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0; min-height: 100vh;
  background: var(--bg); color: var(--text);
  /* impeccable: system fonts as base — instant, native, distinctive */
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI Variable", "Segoe UI", system-ui, "Helvetica Neue", sans-serif;
  font-size: 14px; line-height: 1.55;
  font-feature-settings: 'kern','cv11';
  font-kerning: normal;
  -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}
body {
  background-image:
    radial-gradient(ellipse 80% 50% at 0% 0%, rgba(31,116,196,0.035) 0%, transparent 50%),
    radial-gradient(ellipse 80% 50% at 100% 0%, rgba(91,166,66,0.025) 0%, transparent 50%);
  background-attachment: fixed;
}

/* Display type — Inter only for headings, paired with system body (impeccable: contrast on personality axis) */
h1, h2, h3 {
  font-family: 'Inter', -apple-system, system-ui, sans-serif;
  color: var(--text); margin: 0; font-weight: 700;
  letter-spacing: -0.025em;
  text-wrap: balance;
  font-optical-sizing: auto;
}
/* Modular scale — 1.333 perfect-fourth ratio: 14 → 18 → 24 → 32 (more contrast, fewer steps) */
h1 { font-size: 32px; line-height: 1.1;  letter-spacing: -0.035em; font-weight: 800; }
h2 { font-size: 24px; line-height: 1.2;  letter-spacing: -0.03em;  font-weight: 700; }
h3 { font-size: 16px; line-height: 1.4;  letter-spacing: -0.015em; font-weight: 600; }
p  { text-wrap: pretty; }
.serif { font-family: 'Inter', system-ui, sans-serif; font-weight: 700; letter-spacing: -0.025em; }
.eyebrow {
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.12em; color: var(--muted);
}

a { color: var(--accent); text-decoration: none; transition: color var(--tt); }
a:hover { color: var(--accent-strong); }

/* Forms */
button, input, select, textarea { font: inherit; color: var(--text); }
button {
  background: var(--text); color: var(--surface);
  border: 1px solid var(--text); padding: 10px 18px;
  border-radius: var(--radius-sm); cursor: pointer; font-weight: 500;
  /* Emil: specify properties, never `all`; pressed scale gives instant tactile feedback */
  transition: transform var(--t-press), background-color 150ms var(--ease-out), border-color 150ms var(--ease-out), box-shadow 150ms var(--ease-out);
  box-shadow: var(--shadow-sm);
  will-change: transform;
}
button:hover { background: var(--accent-strong); border-color: var(--accent-strong); box-shadow: var(--shadow); }
button:active { transform: scale(0.97); }
button.secondary { background: var(--surface); color: var(--text); border-color: var(--border-strong); box-shadow: none; }
button.secondary:hover { background: var(--bg-tint); border-color: var(--text-2); }
button.ghost { background: transparent; color: var(--text-2); border-color: transparent; box-shadow: none; padding: 6px 12px; }
button.ghost:hover { background: var(--bg-tint); color: var(--text); }
button.accent { background: var(--accent); border-color: var(--accent); }
button.accent:hover { background: var(--accent-strong); }
button.danger { background: var(--surface); color: var(--red); border-color: #f0d6d4; box-shadow: none; }
button.danger:hover { background: #fbeae8; border-color: #e7b9b5; }
button:disabled { opacity: .5; cursor: not-allowed; }
button:disabled:active { transform: none; }
button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

input, select, textarea {
  background: var(--surface); border: 1px solid var(--border-strong);
  padding: 10px 12px; border-radius: var(--radius-sm); width: 100%;
  transition: border-color 150ms var(--ease-out), box-shadow 150ms var(--ease-out);
}
input:focus, select:focus, textarea:focus {
  outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft);
}
/* Subtle press feedback on selects too */
select:active { transform: scale(0.99); }
label {
  display: block; margin: 14px 0 6px;
  color: var(--muted); font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.08em;
}

/* Tables */
table { width: 100%; border-collapse: collapse; }
th, td { padding: 12px 14px; text-align: left; border-bottom: 1px solid var(--border); }
thead th {
  color: var(--muted); font-weight: 600; font-size: 11px;
  text-transform: uppercase; letter-spacing: 0.08em;
  background: var(--surface-2); border-bottom: 1px solid var(--border-strong);
}
tbody tr { transition: background var(--tt); }
tbody tr:hover { background: var(--surface-2); }

/* Layout primitives */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 22px;
  margin-bottom: 18px; box-shadow: var(--shadow-sm);
  transition: box-shadow 200ms var(--ease-out), border-color 200ms var(--ease-out);
}
@media (hover: hover) {
  .card:hover { box-shadow: var(--shadow); border-color: var(--border-strong); }
}
.card.tight { padding: 16px; }
.card-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; gap: 12px; flex-wrap: wrap; }

.row { display: flex; gap: 14px; flex-wrap: wrap; }
.row > * { flex: 1; min-width: 200px; }
.grid { display: grid; gap: 16px; }
.grid.cols-2 { grid-template-columns: repeat(2, 1fr); }
.grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
.grid.cols-4 { grid-template-columns: repeat(4, 1fr); }
@media (max-width: 900px) { .grid.cols-3, .grid.cols-4 { grid-template-columns: 1fr 1fr; } }
@media (max-width: 560px) { .grid.cols-2, .grid.cols-3, .grid.cols-4 { grid-template-columns: 1fr; } }

/* Pills */
.pill {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 600;
  background: var(--bg-tint); color: var(--text-2); border: 1px solid var(--border);
}
.pill::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--muted); }
.pill.ok { background: #eaf4ee; color: #0e6b3f; border-color: #c8e3d3; }
.pill.ok::before { background: var(--green); }
.pill.warn { background: #fcf3e1; color: #8a5a14; border-color: #f0dfb6; }
.pill.warn::before { background: var(--amber); }
.pill.bad { background: #fbeae8; color: #962e25; border-color: #f0c8c4; }
.pill.bad::before { background: var(--red); }
.pill.info { background: #e7eff8; color: #2c5282; border-color: #c5d6ea; }
.pill.info::before { background: var(--blue); }
.pill.gold { background: var(--gold-soft); color: #735a1d; border-color: #e7d5a7; }
.pill.gold::before { background: var(--gold); }

/* Header */
header.top {
  background: rgba(255,255,255,0.92);
  backdrop-filter: saturate(140%) blur(12px);
  -webkit-backdrop-filter: saturate(140%) blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 14px 28px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 30;
}
header.top .brand { display: flex; align-items: center; gap: 12px; }
header.top .brand-mark { display: grid; place-items: center; }
header.top .brand-text { display: flex; flex-direction: column; line-height: 1; }
header.top .brand-text .name { font-family: 'Inter'; font-weight: 800; font-size: 18px; letter-spacing: -0.015em; color: var(--text); }
header.top .brand-text .tag { font-size: 9.5px; font-weight: 600; letter-spacing: 0.14em; color: var(--muted); margin-top: 3px; text-transform: uppercase; }
header.top h1 { font-size: 15px; font-weight: 600; letter-spacing: -0.005em; color: var(--muted); }
header.top h1 .accent { color: var(--accent); font-weight: 700; }
header.top .divider-v { width: 1px; height: 24px; background: var(--border-strong); margin: 0 6px; }
header.top .user { display: flex; gap: 12px; align-items: center; color: var(--muted); font-size: 13px; }
header.top .user .avatar {
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--accent-soft); color: var(--accent);
  display: grid; place-items: center; font-weight: 600; font-size: 12px;
}

/* Nav */
nav.tabs {
  display: flex; gap: 2px; overflow-x: auto;
  padding: 0 28px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
nav.tabs button {
  background: transparent; color: var(--muted);
  border: 0; box-shadow: none;
  padding: 14px 16px; border-radius: 0;
  white-space: nowrap; font-weight: 500; font-size: 13px;
  border-bottom: 2px solid transparent;
  text-transform: capitalize;
  transition: color var(--tt), border-color var(--tt);
}
nav.tabs button:hover { color: var(--text); background: transparent; transform: none; box-shadow: none; }
nav.tabs button.active { color: var(--accent); border-bottom-color: var(--accent); background: transparent; }
nav.tabs select {
  margin-left: auto; align-self: center; max-width: 220px;
  border: 1px solid var(--border); padding: 6px 10px; font-size: 13px;
}

main {
  padding: 28px;
  max-width: 1400px;
  margin: 0 auto;
}
/* ============ MOBILE OPTIMIZATIONS ============ */
* { -webkit-tap-highlight-color: rgba(31,116,196,0.12); }
html { -webkit-text-size-adjust: 100%; }

@media (max-width: 720px) {
  /* Header: lean — drop the corp tagline + page subtitle on phones */
  header.top {
    padding: 10px 14px;
    padding-left: max(14px, env(safe-area-inset-left));
    padding-right: max(14px, env(safe-area-inset-right));
  }
  header.top .brand { gap: 10px; }
  header.top .brand-text .tag { display: none; }
  header.top .divider-v, header.top h1 { display: none; }
  header.top .user span:not(.small) { display: none; }
  header.top .user .small { display: none; }
  header.top .user { gap: 8px; }

  /* Nav: bigger touch targets, hide branch selector behind a smaller pill */
  nav.tabs {
    padding: 0 10px;
    padding-left: max(10px, env(safe-area-inset-left));
    padding-right: max(10px, env(safe-area-inset-right));
    -webkit-overflow-scrolling: touch;
    scroll-snap-type: x proximity;
  }
  nav.tabs button { padding: 14px 12px; font-size: 13px; min-height: 44px; scroll-snap-align: start; }
  nav.tabs select { font-size: 12px; max-width: 140px; padding: 6px 8px; }

  /* Main: safe-area, slimmer padding */
  main {
    padding: 14px;
    padding-left: max(14px, env(safe-area-inset-left));
    padding-right: max(14px, env(safe-area-inset-right));
    padding-bottom: max(20px, env(safe-area-inset-bottom));
  }

  /* Cards: tighter, less aggressive shadows */
  .card { padding: 16px; border-radius: 12px; margin-bottom: 12px; }
  .card.tight { padding: 14px; }
  .card-head { gap: 8px; margin-bottom: 12px; }
  .card-head .small { font-size: 10.5px; }

  /* Section heads compress */
  .section-head { margin-bottom: 14px; }
  .section-head h2 { font-size: 19px; }
  .section-head .desc { font-size: 13px; line-height: 1.5; }
  .eyebrow { font-size: 10px; }

  /* KPI grid: keep 2 columns on phones (override the 560 rule which kicks to 1) */
  .grid.cols-3, .grid.cols-4 { grid-template-columns: 1fr 1fr; gap: 10px; }
  .kpi { font-size: 28px; letter-spacing: -0.03em; }
  .kpi-label { font-size: 10px; letter-spacing: 0.06em; }
  .kpi-card { padding-left: 10px; }

  /* Tables: convert to stacked card-rows on mobile (no horizontal scroll) */
  .card { overflow: hidden; } /* clip any table overflow inside card */
  table { display: block; width: 100%; border: 0; }
  thead { display: none; } /* labels handled per-cell via data-label */
  tbody, tfoot { display: block; }
  tr { display: block; background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; margin-bottom: 10px; transition: none; }
  tr:hover { background: var(--surface-2); }
  tr:last-child { margin-bottom: 0; }
  td {
    display: flex; justify-content: space-between; align-items: center;
    padding: 7px 0; border: 0; gap: 12px;
    white-space: normal; text-align: right; font-size: 13.5px; min-height: 0;
  }
  td:before {
    content: attr(data-label);
    color: var(--muted); font-size: 10.5px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.08em;
    flex: 0 0 auto; text-align: left;
  }
  td:first-child {
    display: block; text-align: left;
    font-size: 15px; font-weight: 600;
    border-bottom: 1px solid var(--border);
    padding-bottom: 12px; margin-bottom: 6px;
  }
  td:first-child:before { display: none; }
  td:last-child { padding-bottom: 0; }
  td .av { width: 30px; height: 30px; font-size: 11px; }
  /* Action button cell: stack buttons full-width */
  td:has(button) { justify-content: flex-end; flex-wrap: wrap; gap: 6px; }
  td button { padding: 8px 14px; font-size: 12.5px; min-height: 36px; }

  /* Tabs: right-edge fade hint for scrollability */
  nav.tabs {
    -webkit-mask-image: linear-gradient(to right, black 0, black calc(100% - 24px), transparent 100%);
    mask-image: linear-gradient(to right, black 0, black calc(100% - 24px), transparent 100%);
  }

  /* Inputs: 16px stops iOS auto-zoom on focus; bigger touch targets */
  input, select, textarea { font-size: 16px; padding: 12px; min-height: 44px; }
  textarea { min-height: 80px; }
  label { margin: 12px 0 6px; }
  button { min-height: 44px; padding: 11px 16px; font-size: 14px; }
  button.ghost { min-height: 40px; padding: 8px 12px; }
  nav.tabs button { padding: 12px 12px; }

  /* Action buttons in tables: keep them visible without wrapping line */
  td button { padding: 8px 12px; font-size: 12px; min-height: 36px; }

  /* Modal: bottom-sheet style on phones */
  .modal-bg { padding: 0; align-items: flex-end; }
  .modal {
    max-width: 100%;
    width: 100%;
    max-height: 92vh;
    border-radius: 18px 18px 0 0;
    padding: 22px 20px;
    padding-bottom: max(22px, env(safe-area-inset-bottom));
    animation: slide-up-mobile 280ms cubic-bezier(.4,0,.2,1);
  }
  @keyframes slide-up-mobile { from { transform: translateY(100%); } to { transform: translateY(0); } }
  /* Drag indicator at top of bottom-sheet */
  .modal::before {
    content: ''; display: block;
    width: 36px; height: 4px; border-radius: 2px;
    background: var(--border-strong);
    margin: -8px auto 14px;
  }
  .actions { flex-direction: column-reverse; gap: 8px; }
  .actions button { width: 100%; }

  /* Roster grid: horizontal scroll with sticky shift column */
  .roster-grid {
    grid-template-columns: 100px repeat(7, 86px);
    overflow-x: auto; -webkit-overflow-scrolling: touch;
    scroll-snap-type: x proximity;
    /* Right-edge fade to hint scrollability */
    -webkit-mask-image: linear-gradient(to right, black 0, black calc(100% - 18px), transparent 100%);
    mask-image: linear-gradient(to right, black 0, black calc(100% - 18px), transparent 100%);
  }
  .roster-grid > div { padding: 8px 6px; font-size: 11px; min-height: 56px; }
  .roster-grid .head { font-size: 10.5px; }
  .roster-grid .head > div:nth-child(2) { font-size: 16px !important; }
  .roster-grid .shift-label { font-size: 12px; position: sticky; left: 0; background: var(--surface); z-index: 1; box-shadow: 1px 0 0 var(--border); }
  .roster-grid .head:first-child { position: sticky; left: 0; z-index: 2; box-shadow: 1px 0 0 var(--border); }
  .duty-cell { font-size: 11px; padding: 4px 6px; }

  /* Login: tighter padding */
  .login { padding: 16px; padding-bottom: max(16px, env(safe-area-inset-bottom)); }
  .login .box { padding: 28px 22px; }
  .login h2 { font-size: 20px; }
  .login .login-brand { gap: 12px; margin-bottom: 18px; }
  .login .brand-text-block .n { font-size: 20px; }
  .login .brand-text-block .t { font-size: 9px; }
  .login .demo-creds { font-size: 11px; padding: 10px 12px; }

  /* Form rows stack */
  .row > * { min-width: 100%; flex: 1 1 100%; }

  /* Disable expensive bg gradients on mobile for perf */
  body { background-image: none; }
  .login { background-image:
    radial-gradient(circle at 30% 10%, rgba(31,116,196,0.05) 0%, transparent 50%),
    radial-gradient(circle at 70% 80%, rgba(91,166,66,0.04) 0%, transparent 50%); }
}

/* Very small phones: 1-col KPIs, even tighter spacing */
@media (max-width: 380px) {
  .grid.cols-3, .grid.cols-4 { grid-template-columns: 1fr; }
  .kpi { font-size: 32px; }
  header.top { padding: 8px 10px; }
  main { padding: 12px; }
  .card { padding: 14px; }
  nav.tabs button { padding: 12px 10px; font-size: 12.5px; }
}

/* Touch-friendly hover-cancel for non-hover devices */
@media (hover: none) {
  button:hover { transform: none; }
  tbody tr:hover { background: transparent; }
  .card:hover { box-shadow: var(--shadow-sm); }
}

/* Empty state */
.empty {
  padding: 50px 20px; text-align: center; color: var(--muted);
  font-style: italic;
}
.empty svg { display: block; margin: 0 auto 12px; opacity: .4; }

/* KPIs — impeccable: drop the card-in-card pattern, use the surface itself */
.kpi {
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 38px; font-weight: 800; line-height: 1;
  letter-spacing: -0.04em; color: var(--text);
  font-variant-numeric: tabular-nums;
  font-optical-sizing: auto;
}
.kpi.accent { color: var(--accent); }
.kpi-label {
  color: var(--muted); font-size: 11px;
  text-transform: uppercase; letter-spacing: 0.1em;
  font-weight: 600; margin-top: 6px;
}
.kpi-card {
  position: relative;
  border-left: 2px solid var(--border);
  padding: 4px 0 4px 14px;
}
.kpi-card.highlight { border-left-color: var(--bcc-blue); }
.kpi-card.gold { border-left-color: var(--bcc-yellow); }
.kpi-card.warn { border-left-color: var(--bcc-red); }
.kpi-card.green { border-left-color: var(--bcc-green); }

/* Login */
.login {
  min-height: 100vh; display: grid; place-items: center; padding: 24px;
  background:
    radial-gradient(circle at 20% 20%, rgba(31,116,196,0.06) 0%, transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(91,166,66,0.05) 0%, transparent 40%),
    radial-gradient(circle at 70% 20%, rgba(244,196,48,0.04) 0%, transparent 40%),
    var(--bg);
}
.login .box {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 40px;
  width: 100%; max-width: 420px;
  box-shadow: var(--shadow-lg);
}
.login .login-brand {
  display: flex; align-items: center; gap: 14px; margin-bottom: 22px;
}
.login .brand-text-block { line-height: 1.1; }
.login .brand-text-block .n { font-weight: 800; font-size: 22px; letter-spacing: -0.025em; color: var(--text); }
.login .brand-text-block .t { font-size: 10px; font-weight: 600; letter-spacing: 0.16em; color: var(--muted); text-transform: uppercase; margin-top: 4px; }
.login h2 { font-size: 22px; margin-bottom: 4px; font-weight: 700; }
.login .sub { color: var(--muted); margin: 0 0 28px; font-size: 14px; }
.login button { width: 100%; margin-top: 18px; padding: 12px; font-weight: 600; }
.login .demo-creds {
  background: var(--surface-2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 12px 14px; margin-top: 22px;
  font-size: 12px; color: var(--text-2); line-height: 1.7;
}
.login .demo-creds .eyebrow { margin-bottom: 6px; }
.login .demo-creds code { background: var(--surface); padding: 1px 6px; border-radius: 3px; border: 1px solid var(--border); font-family: 'SF Mono', Menlo, Consolas, monospace; font-size: 11px; }

.err { background: #fbeae8; color: #962e25; border: 1px solid #f0c8c4; padding: 10px 14px; border-radius: var(--radius-sm); margin: 12px 0; font-size: 13px; }

/* Roster grid */
.roster-grid {
  display: grid;
  grid-template-columns: 180px repeat(7, minmax(120px, 1fr));
  gap: 0;
  background: var(--border);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius);
  overflow: hidden;
  margin-top: 14px;
}
.roster-grid > div {
  background: var(--surface);
  padding: 10px 12px; font-size: 13px; min-height: 64px;
}
.roster-grid > div:not(:last-child) { border-right: 1px solid var(--border); }
.roster-grid > div { border-bottom: 1px solid var(--border); }
.roster-grid .head {
  background: var(--surface-2);
  font-weight: 600; text-align: center;
  font-size: 12px; color: var(--text-2);
  letter-spacing: 0.04em;
}
.roster-grid .head.weekend { color: var(--accent); }
.roster-grid .shift-label { font-weight: 600; }
.roster-grid .shift-label .small { color: var(--muted); font-weight: 400; font-size: 11px; }
.duty-cell {
  background: var(--accent-soft); color: var(--accent-strong);
  border-radius: var(--radius-sm); padding: 5px 8px;
  margin: 3px 0; font-size: 12px; font-weight: 500;
  border: 1px solid #d4e6dc;
  transition: all var(--tt);
}
.duty-cell:hover { background: #d8e8e0; border-color: #b8d4c5; }

/* Modal — Emil: never animate from scale(0); start from 0.96 with opacity */
.modal-bg {
  position: fixed; inset: 0; background: rgba(15,23,42,0.45);
  backdrop-filter: blur(6px) saturate(120%); -webkit-backdrop-filter: blur(6px) saturate(120%);
  display: grid; place-items: center; z-index: 50; padding: 20px;
  animation: bg-fade-in 180ms var(--ease-out);
}
.modal {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 28px;
  max-width: 520px; width: 100%; max-height: 90vh; overflow: auto;
  box-shadow: var(--shadow-lg);
  /* Modals stay center-origin per Emil's rule */
  transform-origin: center;
  animation: modal-in var(--t-modal);
}
.modal h3 { margin-bottom: 4px; font-size: 20px; }
.modal .sub { color: var(--muted); font-size: 13px; margin: 0 0 20px; }
.actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; padding-top: 18px; border-top: 1px solid var(--border); }

/* Animations — short, ease-out, never from scale(0) */
@keyframes bg-fade-in { from { opacity: 0; } to { opacity: 1; } }
@keyframes modal-in {
  from { opacity: 0; transform: scale(0.96) translateY(4px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}
@keyframes fade-in { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
.fade-in { animation: fade-in 200ms var(--ease-out) both; }

/* Stagger children entrances for grids — feels alive without being slow */
.stagger > * { animation: fade-in 280ms var(--ease-out) both; }
.stagger > *:nth-child(1) { animation-delay: 0ms; }
.stagger > *:nth-child(2) { animation-delay: 40ms; }
.stagger > *:nth-child(3) { animation-delay: 80ms; }
.stagger > *:nth-child(4) { animation-delay: 120ms; }
.stagger > *:nth-child(5) { animation-delay: 160ms; }
.stagger > *:nth-child(6) { animation-delay: 200ms; }
.stagger > *:nth-child(7) { animation-delay: 240ms; }
.stagger > *:nth-child(8) { animation-delay: 280ms; }

/* Toast — Sonner-style stack, bottom-center */
.toast-host {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  z-index: 100; display: flex; flex-direction: column-reverse; gap: 8px;
  padding-bottom: env(safe-area-inset-bottom);
  pointer-events: none;
}
.toast {
  pointer-events: auto;
  background: var(--text); color: var(--surface);
  padding: 12px 16px; border-radius: 12px;
  box-shadow: 0 10px 30px rgba(15,23,42,0.18), 0 4px 12px rgba(15,23,42,0.08);
  font-size: 13.5px; font-weight: 500;
  display: flex; align-items: center; gap: 10px;
  min-width: 240px; max-width: 380px;
  animation: toast-in 280ms var(--ease-out-soft);
  border: 1px solid rgba(255,255,255,0.08);
}
.toast .toast-icon {
  width: 18px; height: 18px; border-radius: 50%; flex-shrink: 0;
  display: grid; place-items: center;
}
.toast.success .toast-icon { background: var(--bcc-green); color: #fff; }
.toast.error .toast-icon { background: var(--bcc-red); color: #fff; }
.toast.info .toast-icon { background: var(--bcc-blue); color: #fff; }
.toast.leaving { animation: toast-out 180ms var(--ease-out) both; }
@keyframes toast-in {
  from { opacity: 0; transform: translateY(20px) scale(0.95); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes toast-out {
  from { opacity: 1; transform: translateY(0) scale(1); }
  to   { opacity: 0; transform: translateY(8px) scale(0.96); }
}

/* Segmented control (Today / Tomorrow / Week) */
.segmented {
  display: inline-flex; padding: 3px; background: var(--bg-tint);
  border: 1px solid var(--border); border-radius: 8px; gap: 2px;
}
.segmented button {
  background: transparent; color: var(--muted); border: 0;
  padding: 6px 14px; font-size: 12.5px; font-weight: 600;
  border-radius: 6px; min-height: 0; box-shadow: none;
  letter-spacing: 0;
  transition: color 150ms var(--ease-out), background 150ms var(--ease-out);
}
.segmented button:hover { background: transparent; color: var(--text); transform: none; box-shadow: none; }
.segmented button.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 2px rgba(15,23,42,0.06); }
.segmented button.active:hover { background: var(--surface); }

/* Live duty board */
.duty-board { display: flex; flex-direction: column; gap: 14px; }
.shift-block {
  border: 1px solid var(--border); border-radius: 10px;
  background: var(--surface-2); overflow: hidden;
  transition: border-color 200ms var(--ease-out);
}
.shift-block:hover { border-color: var(--border-strong); }
.shift-block-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 11px 14px; background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.shift-block-head .name { font-weight: 600; font-size: 14px; color: var(--text); }
.shift-block-head .time { font-size: 12px; color: var(--muted); margin-left: 8px; font-weight: 500; }
.shift-block-head .meta { font-size: 11px; color: var(--muted); font-weight: 600; letter-spacing: 0.04em; }
.duty-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 14px; border-bottom: 1px solid var(--border);
  font-size: 13.5px;
  transition: background 150ms var(--ease-out);
}
.duty-row:last-child { border-bottom: 0; }
.duty-row:hover { background: rgba(31,116,196,0.03); }
.duty-row .who { display: flex; align-items: center; gap: 10px; }
.duty-row .who .av { width: 26px; height: 26px; font-size: 10px; margin: 0; }
.duty-row .status { display: flex; align-items: center; gap: 6px; font-size: 11.5px; font-weight: 600; color: var(--muted); }

/* Live pulse dot */
.live-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--bcc-green); position: relative;
  flex-shrink: 0;
}
.live-dot::after {
  content: ''; position: absolute; inset: -3px; border-radius: 50%;
  background: var(--bcc-green); opacity: 0.4;
  animation: pulse-out 1.6s ease-out infinite;
}
@keyframes pulse-out {
  0%   { transform: scale(0.6); opacity: 0.5; }
  80%  { transform: scale(1.6); opacity: 0; }
  100% { transform: scale(1.6); opacity: 0; }
}
.status.live { color: var(--bcc-green); }
.status.upcoming { color: var(--bcc-blue); }
.status.ended { color: var(--faint); }
.status.dot {
  width: 6px; height: 6px; border-radius: 50%; display: inline-block;
}

/* Empty shift block */
.shift-empty {
  padding: 20px 14px; text-align: center;
  font-size: 12.5px; color: var(--muted); font-style: italic;
}

@media (max-width: 720px) {
  .shift-block { background: var(--surface); }
  .duty-row { padding: 10px 12px; }
  .segmented button { padding: 7px 12px; font-size: 12px; }
}

/* ============ STAFF HERO (phone-first big visual) ============ */
.staff-hello { padding: 4px 0 14px; }
.staff-hello h1 { font-size: 28px; line-height: 1.05; letter-spacing: -0.035em; font-weight: 800; margin-top: 4px; }
.staff-hello .eyebrow { font-size: 11px; }

.duty-hero {
  position: relative;

.pulse-dot {

@keyframes pulse {

}
.night-tag {
  display: inline-flex; align-items: center; gap: 4px;
  background: rgba(255,255,255,0.18); color: #fff;
  padding: 4px 10px; border-radius: 999px;
  font-size: 11px; font-weight: 600;
  backdrop-filter: blur(6px);
}
.duty-hero-time {
  display: flex; align-items: baseline; gap: 12px;
  font-family: 'Inter', system-ui, sans-serif;
  font-feature-settings: 'tnum';
  font-weight: 800;
  letter-spacing: -0.045em;
  line-height: 1;
  margin: 4px 0 8px;
}
.duty-hero-time .big { font-size: 56px; }
.duty-hero-time .sep {
  font-size: 22px; font-weight: 600;
  opacity: 0.55; letter-spacing: 0;
  align-self: center;
}
.duty-hero-shift {
  font-size: 17px; font-weight: 600;
  color: rgba(255,255,255,0.92);
  letter-spacing: -0.01em;
  margin-top: 2px;
}
.duty-hero.empty .duty-hero-shift { color: var(--text); }
.duty-hero-shift .sep-mid { margin: 0 8px; opacity: 0.5; }
.duty-hero-count {
  margin-top: 14px;
  font-size: 14px; font-weight: 600;
  color: rgba(255,255,255,0.95);
  display: flex; align-items: baseline; gap: 6px;
}
.duty-hero-count .lab { opacity: 0.7; font-weight: 500; text-transform: lowercase; letter-spacing: 0.02em; }
.duty-hero-count .val { font-variant-numeric: tabular-nums; font-size: 16px; font-weight: 700; letter-spacing: -0.01em; }
.duty-hero-sub { margin-top: 4px; color: rgba(255,255,255,0.75); font-size: 13px; }
.duty-hero.empty .duty-hero-sub { color: var(--muted); }
.duty-hero-actions {
  display: flex; gap: 10px; margin-top: 20px;
  flex-wrap: wrap;
}
.hero-btn {
  flex: 1 1 140px;
  padding: 14px 18px;
  border-radius: 12px;
  font-size: 15px; font-weight: 600;
  cursor: pointer; border: 0;
  transition: transform 100ms var(--ease-out), background 200ms var(--ease-out);
}
.hero-btn:active { transform: scale(0.97); }
.hero-btn.primary {
  background: #fff; color: var(--branch-accent);
}
.hero-btn.primary:hover { background: rgba(255,255,255,0.92); transform: none; }
.hero-btn.ghost-on-accent {

  color: #fff;
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.22);
}
.hero-btn.ghost-on-accent:hover { background: rgba(255,255,255,0.26); transform: none; }
.duty-hero-branch {
  margin-top: 16px; padding-top: 14px;
  border-top: 1px solid rgba(255,255,255,0.18);
  display: flex; align-items: center; gap: 10px;
  font-size: 12px; font-weight: 600;
  color: rgba(255,255,255,0.85);
  text-transform: uppercase; letter-spacing: 0.1em;
}
.duty-hero-branch img { filter: brightness(0) invert(1); opacity: 0.92; }

/* Stats row */
.staff-stats {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
  margin-bottom: 18px;
}
.staff-stat {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 12px;
  text-align: center;
}
.staff-stat .sv {
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 26px; font-weight: 800;
  letter-spacing: -0.03em; line-height: 1;
  color: var(--branch-accent);
  font-variant-numeric: tabular-nums;
}
.staff-stat .sl {
  margin-top: 6px;
  font-size: 10.5px; font-weight: 600;
  color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.08em;
}

/* Shift list */
.shift-list { display: flex; flex-direction: column; }
.shift-row {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 0;

  transition: background 150ms var(--ease-out);
}

.shift-info .sname { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }

/* Mobile — even bigger hero */
@media (max-width: 720px) {
  .staff-hello h1 { font-size: 26px; }
  .duty-hero { padding: 22px 20px 18px; border-radius: 18px; }

.skel-line { height: 12px; width: 100%; margin: 6px 0; }

  display: inline-block; width: 18px; height: 18px;

  border-radius: 50%; animation: spin 700ms linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.center-loader { display: grid; place-items: center; padding: 60px; }

/* Hospitality flourish — subtle decoration */
.subtle-deco::before {
  content: '';
  display: block; width: 32px; height: 1px;

/* Badge / chip */
.chip {
  display: inline-flex; align-items: center; gap: 6px;

/* Avatar */

.section-head .eyebrow { margin-bottom: 6px; display: block; }
.section-head h2 { margin-bottom: 4px; }

button, a, input, select, textarea, .duty-cell, .pill { cursor: default; }
button, a, .duty-cell { cursor: pointer; }

/* Selection */
::selection { background: var(--accent-soft); color: var(--accent-strong); }

<body>
<div id="app"></div>

<script>
/* ============================================================
   BCC Duty & Roster — Vanilla SPA (light theme, premium minimal)
============================================================ */
const API = '/api';

const State = {
  user: null,
  token: localStorage.getItem('bcc_token') || null,
  refresh: localStorage.getItem('bcc_refresh') || null,
  branches: [],
  page: 'dashboard',
  selectedBranchId: localStorage.getItem('bcc_branch') || null,
  modal: null,
};

/* -------------------- API -------------------- */
async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
  if (State.token) headers.Authorization = `Bearer ${State.token}`;
  const r = await fetch(API + path, { ...opts, headers, body: opts.body ? JSON.stringify(opts.body) : undefined });
  if (r.status === 401 && State.refresh && path !== '/auth/refresh') {
    if (await tryRefresh()) return api(path, opts);
    logout();
  }
  if (r.status === 204) return null;
  let data = null;
  try { data = await r.json(); } catch {}
  if (!r.ok) throw new Error(data?.error || `HTTP ${r.status}`);
  return data;
}
async function apiBlob(path) {
  const r = await fetch(API + path, { headers: State.token ? { Authorization: `Bearer ${State.token}` } : {} });
  if (!r.ok) throw new Error('Download failed');
  return r.blob();
}
async function tryRefresh() {
  try {
    const r = await fetch(API + '/auth/refresh', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ refresh_token: State.refresh }) });
    if (!r.ok) return false;
    const j = await r.json();
    State.token = j.access_token; State.refresh = j.refresh_token;
    localStorage.setItem('bcc_token', j.access_token);
    localStorage.setItem('bcc_refresh', j.refresh_token);
    return true;
  } catch { return false; }
}
function logout() {
  localStorage.removeItem('bcc_token'); localStorage.removeItem('bcc_refresh');
  State.token = null; State.refresh = null; State.user = null;
  render();
}

/* -------------------- Helpers -------------------- */
const $ = (id) => document.getElementById(id);
const el = (tag, attrs = {}, ...kids) => {
  const n = document.createElement(tag);
  for (const k in attrs) {
    if (k === 'class') n.className = attrs[k];
    else if (k.startsWith('on')) n.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
    else if (k === 'html') n.innerHTML = attrs[k];
    else if (attrs[k] !== false && attrs[k] != null) n.setAttribute(k, attrs[k]);
  }
  kids.flat().forEach(k => { if (k == null || k === false) return; n.append(k.nodeType ? k : document.createTextNode(k)); });
  return n;
};
const fmtDate = (d) => new Date(d).toISOString().slice(0, 10);
const fmtTime = (d) => new Date(d).toISOString().slice(11, 16);
const fmtDateTime = (d) => `${fmtDate(d)} ${fmtTime(d)}`;
const niceDate = (d) => new Date(d).toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
function mondayOf(d = new Date()) { const x = new Date(d); const dow = (x.getDay() + 6) % 7; x.setDate(x.getDate() - dow); x.setHours(0,0,0,0); return x; }
function showModal(content) { State.modal = content; render(); }
function closeModal() { State.modal = null; render(); }

/* Sonner-style toast — Emil: ease-out, under 300ms, interruptible via CSS transition */
function toastHost() {
  let host = document.getElementById('toast-host');
  if (!host) { host = document.createElement('div'); host.id = 'toast-host'; host.className = 'toast-host'; document.body.appendChild(host); }
  return host;
}
function toast(msg, kind = 'info', ms = 3500) {
  const host = toastHost();
  const t = document.createElement('div');
  t.className = `toast ${kind}`;
  const icon = document.createElement('span');
  icon.className = 'toast-icon';
  icon.innerHTML = kind === 'success' ? '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'
                : kind === 'error' ? '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>'
                : '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"><line x1="12" y1="6" x2="12" y2="14"/><circle cx="12" cy="18" r="0.5"/></svg>';
  t.append(icon);
  const text = document.createElement('span');
  text.textContent = msg;
  t.append(text);
  host.appendChild(t);
  const remove = () => { t.classList.add('leaving'); setTimeout(() => t.remove(), 200); };
  setTimeout(remove, ms);
  t.addEventListener('click', remove);
}
function showError(msg) { toast(msg, 'error'); }
function showSuccess(msg) { toast(msg, 'success'); }

/* Auto-label table cells with their column header text — drives mobile stacked-card view */
function enrichTablesForMobile(root) {
  (root || document).querySelectorAll('table').forEach(t => {
    const heads = [...t.querySelectorAll('thead th')].map(th => th.textContent.trim());
    if (!heads.length) return;
    t.querySelectorAll('tbody tr').forEach(tr => {
      [...tr.children].forEach((td, i) => {
        if (heads[i] && !td.hasAttribute('data-label')) td.setAttribute('data-label', heads[i]);
      });
    });
  });
}

/* Animated number counter — Emil: short, ease-out (300ms feels fast yet noticeable) */
function animateCounter(elNode, target, duration = 600) {
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) { elNode.textContent = String(target); return; }
  const start = 0; const startTime = performance.now();
  function step(t) {
    const p = Math.min(1, (t - startTime) / duration);
    const eased = 1 - Math.pow(1 - p, 3); // ease-out cubic
    elNode.textContent = String(Math.round(start + (target - start) * eased));
    if (p < 1) requestAnimationFrame(step);
    else elNode.textContent = String(target);
  }
  requestAnimationFrame(step);
}

async function loadBootstrap() {
  if (!State.user) {
    try { State.user = await api('/auth/me'); } catch { return; }
  }
  try { State.branches = await api('/branches'); } catch { State.branches = []; }
  if (!State.selectedBranchId && State.branches[0]) State.selectedBranchId = State.branches[0].id;
  applyBranchTheme(activeBranch());
}

/* Active branch for theming — follows selectedBranchId for super_admin, branch_id for everyone else */
function activeBranch() {
  const id = State.user?.role === 'super_admin' ? State.selectedBranchId : State.user?.branch_id;
  return State.branches.find(b => b.id === id) || State.branches[0] || null;
}

/* Apply a branch's accent colour to CSS vars — every component picks it up */
function applyBranchTheme(branch) {
  const root = document.documentElement;
  const accent = branch?.accent || '#1f74c4';
  const dark = shadeHex(accent, -0.18);
  const soft = hexAlpha(accent, 0.10);
  root.style.setProperty('--accent', accent);
  root.style.setProperty('--accent-strong', dark);
  root.style.setProperty('--accent-soft', soft);
  root.style.setProperty('--branch-accent', accent);
  root.style.setProperty('--branch-accent-soft', soft);
  root.style.setProperty('--branch-accent-grad', `linear-gradient(135deg, ${accent} 0%, ${dark} 100%)`);
  // theme-color meta for mobile chrome
  let m = document.querySelector('meta[name="theme-color"]');
  if (!m) { m = document.createElement('meta'); m.name = 'theme-color'; document.head.appendChild(m); }
  m.content = accent;
}
function hexAlpha(hex, a) {
  const h = hex.replace('#', '');
  const r = parseInt(h.slice(0,2), 16), g = parseInt(h.slice(2,4), 16), b = parseInt(h.slice(4,6), 16);
  return `rgba(${r}, ${g}, ${b}, ${a})`;
}
function shadeHex(hex, amt) {
  const h = hex.replace('#', '');
  let r = parseInt(h.slice(0,2), 16), g = parseInt(h.slice(2,4), 16), b = parseInt(h.slice(4,6), 16);
  r = Math.max(0, Math.min(255, Math.round(r + r * amt)));
  g = Math.max(0, Math.min(255, Math.round(g + g * amt)));
  b = Math.max(0, Math.min(255, Math.round(b + b * amt)));
  return '#' + [r,g,b].map(x => x.toString(16).padStart(2,'0')).join('');
}

/* Live duty board state — persists between renders */
const DBState = {
  view: 'today',           // today | tomorrow | week
  branchId: null,          // overrides selectedBranchId for super_admin only
  refreshTimer: null,
};

function dayKey(d) { return new Date(d).toISOString().slice(0, 10); }
function dutyStatus(duty, now = new Date()) {
  const start = new Date(duty.start_at), end = new Date(duty.end_at);
  if (now >= start && now <= end) return { kind: 'live', label: 'On shift' };
  if (now < start) {
    const mins = Math.round((start - now) / 60000);
    if (mins < 60) return { kind: 'upcoming', label: `In ${mins}m` };
    if (mins < 1440) return { kind: 'upcoming', label: `In ${Math.round(mins/60)}h` };
    return { kind: 'upcoming', label: niceDate(duty.date).split(',')[0] };
  }
  return { kind: 'ended', label: 'Ended' };
}

async function renderLiveDutyBoard() {
  const card = el('div', { class: 'card' });

  // Resolve branch (super_admin can override; others locked to their branch)
  const branchId = (State.user.role === 'super_admin'
    ? (DBState.branchId || State.selectedBranchId || State.branches[0]?.id)
    : State.user.branch_id);
  if (DBState.branchId == null && State.user.role === 'super_admin') DBState.branchId = branchId;
  const branch = State.branches.find(b => b.id === branchId);

  // Header: title + branch picker (super_admin) + segmented day switcher
  const head = el('div', { class: 'card-head' });
  head.append(el('div', { style: 'display:flex;align-items:center;gap:10px' },
    BranchLogo(branch, 32),
    el('div', {}, el('h3', {}, 'Live duty board'), el('div', { class: 'small' }, branch?.name || '—')),
  ));

  const right = el('div', { style: 'display:flex;gap:10px;align-items:center;flex-wrap:wrap' });
  if (State.user.role === 'super_admin' && State.branches.length > 1) {
    const sel = el('select', { style: 'max-width:170px;padding:6px 8px;font-size:12.5px;min-height:34px' });
    State.branches.forEach(b => sel.append(el('option', { value: b.id, selected: b.id === branchId }, b.name)));
    sel.onchange = () => { DBState.branchId = sel.value; refreshDutyBoard(); };
    right.append(sel);
  }
  const seg = el('div', { class: 'segmented' });
  ['today', 'tomorrow', 'week'].forEach(v => {
    const b = el('button', { class: DBState.view === v ? 'active' : '' }, v[0].toUpperCase() + v.slice(1));
    b.onclick = () => { DBState.view = v; refreshDutyBoard(); };
    seg.append(b);
  });
  right.append(seg);
  head.append(right);
  card.append(head);

  // Body container
  const body = el('div', { class: 'duty-board', id: 'duty-board-body' });
  card.append(body);

  await populateDutyBoard(body, branchId);

  // Auto-refresh every 45s for live feel
  if (DBState.refreshTimer) clearInterval(DBState.refreshTimer);
  DBState.refreshTimer = setInterval(() => {
    const node = document.getElementById('duty-board-body');
    if (!node) { clearInterval(DBState.refreshTimer); DBState.refreshTimer = null; return; }
    populateDutyBoard(node, branchId);
  }, 45000);

  return card;
}

function refreshDutyBoard() {
  // Re-render just the dashboard view in place
  if (State.page === 'dashboard') render();
}

async function populateDutyBoard(host, branchId) {
  host.innerHTML = '';
  // Skeleton while loading
  for (let i = 0; i < 2; i++) {
    const s = el('div', { class: 'shift-block' });
    s.append(el('div', { class: 'shift-block-head' }, el('span', { class: 'skel skel-line', style: 'width:100px;height:14px' })));
    for (let j = 0; j < 2; j++) {
      s.append(el('div', { class: 'duty-row' },
        el('div', { class: 'who' }, el('span', { class: 'skel', style: 'width:26px;height:26px;border-radius:50%' }), el('span', { class: 'skel skel-line', style: 'width:120px' })),
        el('span', { class: 'skel skel-line', style: 'width:60px' }),
      ));
    }
    host.append(s);
  }

  try {
    // Find the published roster covering "today" for the selected branch
    const rosters = await api('/roster?branch_id=' + branchId);
    const today = new Date();
    const todayKey = dayKey(today);
    const tomorrowKey = dayKey(new Date(today.getTime() + 86400000));

    // Match roster whose week_start..week_start+7 covers today
    const active = rosters.find(r => {
      const ws = new Date(r.week_start);
      const we = new Date(ws.getTime() + 7 * 86400000);
      return today >= ws && today < we && (r.status === 'published' || r.status === 'locked');
    });

    if (!active) {
      host.innerHTML = '';
      host.append(el('div', { class: 'empty', style: 'padding:30px 16px' },
        svgIcon('inbox'), el('div', {}, 'No published roster for this week'),
        el('div', { class: 'small', style: 'margin-top:6px' }, 'Generate one in the Roster tab to see live duties here.')));
      return;
    }

    const detail = await api('/roster/' + active.id);

    // Filter duties by view
    let duties = detail.duties;
    if (DBState.view === 'today') duties = duties.filter(d => dayKey(d.date) === todayKey);
    else if (DBState.view === 'tomorrow') duties = duties.filter(d => dayKey(d.date) === tomorrowKey);
    // 'week' = all

    // Group by shift type, then within each by day
    const byShift = {};
    duties.forEach(d => {
      const k = d.shift_type.id;
      if (!byShift[k]) byShift[k] = { name: d.shift_type.name, time: `${d.shift_type.start_time}–${d.shift_type.end_time}`, required: d.shift_type.required_staff || 1, items: [] };
      byShift[k].items.push(d);
    });

    host.innerHTML = '';
    if (!Object.keys(byShift).length) {
      host.append(el('div', { class: 'empty', style: 'padding:30px 16px' },
        svgIcon('inbox'), el('div', {}, DBState.view === 'today' ? 'Nobody scheduled today' : DBState.view === 'tomorrow' ? 'Nobody scheduled tomorrow' : 'No duties this week')));
      return;
    }

    Object.values(byShift).forEach(sh => {
      const block = el('div', { class: 'shift-block' });
      const blockHead = el('div', { class: 'shift-block-head' },
        el('div', {},
          el('span', { class: 'name' }, sh.name),
          el('span', { class: 'time' }, sh.time),
        ),
        el('span', { class: 'meta' }, `${sh.items.length}/${sh.required * (DBState.view === 'week' ? Math.ceil(sh.items.length / sh.required) || 1 : 1)} ${sh.items.length < sh.required ? '· UNDERSTAFFED' : ''}`),
      );
      block.append(blockHead);

      sh.items.sort((a, b) => new Date(a.start_at) - new Date(b.start_at));
      sh.items.forEach(duty => {
        const status = dutyStatus(duty);
        const row = el('div', { class: 'duty-row' });
        row.append(
          el('div', { class: 'who' },
            el('div', { class: 'av' }, initials(duty.staff?.full_name || '?')),
            el('div', {},
              el('div', { style: 'font-weight:500' }, duty.staff?.full_name || '—'),
              DBState.view === 'week' ? el('div', { class: 'small' }, niceDate(duty.date)) : null,
            ),
          ),
          el('div', { class: `status ${status.kind}` },
            status.kind === 'live' ? el('span', { class: 'live-dot' }) : el('span', { class: 'status dot', style: `background: ${status.kind === 'upcoming' ? 'var(--bcc-blue)' : 'var(--faint)'}` }),
            status.label,
          ),
        );
        block.append(row);
      });

      host.append(block);
    });
  } catch (e) {
    host.innerHTML = '';
    host.append(el('div', { class: 'err' }, 'Failed to load: ' + e.message));
  }
}

function renderRosterGrid(roster) {
  const card = el('div', { class: 'card' });
  card.append(el('div', { class: 'card-head' },
    el('div', {}, el('h3', {}, `Week of ${niceDate(roster.week_start)}`), el('div', { class: 'small' }, roster.branch?.name)),
    el('span', { class: `pill ${roster.status === 'published' ? 'ok' : roster.status === 'locked' ? 'info' : 'warn'}` }, roster.status),
  ));
  const days = Array.from({ length: 7 }, (_, i) => { const d = new Date(roster.week_start); d.setDate(d.getDate() + i); return d; });
  const grid = el('div', { class: 'roster-grid' });
  grid.append(el('div', { class: 'head' }, 'Shift'));
  days.forEach(d => {
    const dow = (d.getDay() + 6) % 7;
    const isWeekend = dow >= 5;
    grid.append(el('div', { class: 'head ' + (isWeekend ? 'weekend' : '') },
      el('div', {}, ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'][dow]),
      el('div', { style: 'font-family:Fraunces;font-size:18px;font-weight:500;color:inherit;margin-top:2px' }, d.getDate()),
    ));
  });
  const byShift = {};
  roster.duties.forEach(d => {
    const key = d.shift_type.id;
    if (!byShift[key]) byShift[key] = { name: d.shift_type.name, time: `${d.shift_type.start_time}–${d.shift_type.end_time}`, days: {} };
    const dk = fmtDate(d.date);
    if (!byShift[key].days[dk]) byShift[key].days[dk] = [];
    byShift[key].days[dk].push(d);
  });
  Object.values(byShift).forEach(sh => {
    grid.append(el('div', { class: 'shift-label' }, el('div', {}, sh.name), el('div', { class: 'small' }, sh.time)));
    days.forEach(d => {
      const dk = fmtDate(d);
      const cell = el('div');
      (sh.days[dk] || []).forEach(duty => {
        const c = staffColor(duty.staff?.id);
        cell.append(el('div', { class: 'duty-cell', title: duty.staff?.full_name, style: `background:${c.bg};color:${c.fg};border-color:${c.border};` }, duty.staff?.full_name?.split(' ').slice(0,2).join(' ') || '—'));
      });
      grid.append(cell);
    });
  });
  card.append(grid);
  return card;
}

async function PagePayroll() {
  const root = el('div', { class: 'fade-in' });
  root.append(SectionHead('Finance', 'Payroll', 'Monthly payroll preview and export — based on approved attendance only.'));
  const branchId = State.user.role === 'super_admin' ? State.selectedBranchId : State.user.branch_id;
  const now = new Date();
  const yIn = el('input', { type: 'number', value: now.getFullYear(), style: 'max-width:140px' });
  const mIn = el('input', { type: 'number', min: 1, max: 12, value: now.getMonth() + 1, style: 'max-width:90px' });
  const card = el('div', { class: 'card' });
  card.append(el('div', { class: 'card-head' }, el('h3', {}, 'Generate payroll'), el('span', { class: 'small' }, 'Approved attendance only')),
    el('div', { class: 'row' },
      el('div', {}, el('label', {}, 'Year'), yIn),
      el('div', {}, el('label', {}, 'Month'), mIn),
      el('div', { style: 'display:flex;align-items:flex-end;gap:8px;flex:0 0 auto' },
        el('button', { class: 'accent', onclick: () => preview() }, 'Preview'),
        el('button', { class: 'secondary', onclick: () => download('xlsx') }, svgIcon('download'), ' .xlsx'),
        el('button', { class: 'secondary', onclick: () => download('csv') }, svgIcon('download'), ' .csv'),
      ),
    ));
  const previewArea = el('div'); card.append(previewArea);

  async function preview() {
    previewArea.innerHTML = '';
    try {
      const rows = await api(`/payroll/preview?branch_id=${branchId}&year=${yIn.value}&month=${mIn.value}`);
      if (!rows.length) { previewArea.append(el('div', { class: 'empty' }, 'No attendance records for this period')); return; }
      const t = el('table');
      t.append(el('thead', {}, el('tr', {},
        el('th',{},'Emp'), el('th',{},'Name'), el('th',{},'Branch'),
        el('th',{},'Sched'), el('th',{},'Worked'), el('th',{},'Late'), el('th',{},'Absent'), el('th',{},'OT hrs'))));
      const tb = el('tbody');
      rows.forEach(r => tb.append(el('tr', {},
        el('td', {}, el('span', { class: 'chip' }, r.employee_id)), el('td', {}, el('strong', {}, r.name)), el('td', {}, r.branch),
        el('td', {}, r.scheduled_days), el('td', {}, r.worked_days), el('td', {}, r.late_count), el('td', {}, r.absences),
        el('td', {}, Number(r.overtime_hours).toFixed(1)),
      )));
      t.append(tb);
      previewArea.append(el('hr', { class: 'divider' }), t);
    } catch (e) { previewArea.append(el('div', { class: 'err' }, e.message)); }
  }
  async function download(format) {
    try {
      const blob = await apiBlob(`/payroll/export.${format}?branch_id=${branchId}&year=${yIn.value}&month=${mIn.value}`);
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
      a.download = `payroll_${yIn.value}_${String(mIn.value).padStart(2,'0')}.${format}`; a.click();
    } catch (e) { showError(e.message); }
  }
  root.append(card);
  return root;
}

async function PageMyRoster() {
  const root = el('div', { class: 'fade-in' });
  const branch = activeBranch();
  const list = await api('/roster/me/upcoming');

  // Find "now" duty (currently active) and "next" duty (next upcoming)
  const now = new Date();
  const todayStart = new Date(now.toDateString());
  const enriched = list.map(d => ({
    ...d,
    _start: new Date(d.start_at),
    _end: new Date(d.end_at),
    _date: new Date(d.date),
  }));
  const onNow = enriched.find(d => d._start <= now && d._end >= now);
  const next  = enriched.find(d => d._start > now);
  const today = enriched.find(d => d._date.toDateString() === now.toDateString() && !onNow);
  const focus = onNow || today || next;

  // Greeting band
  const hello = el('div', { class: 'staff-hello' },
    el('div', { class: 'eyebrow', style: 'color:var(--branch-accent)' }, niceDate(now)),
    el('h1', {}, `Hi, ${State.user.name.split(' ')[0]}`),
  );
  root.append(hello);

  // HERO — biggest visual element, branded with branch accent
  const hero = el('div', { class: 'duty-hero' });
  if (focus) {
    const isNow = !!onNow;
    const startMs = focus._start.getTime();
    const endMs = focus._end.getTime();
    const nowMs = now.getTime();

    let label, sub;
    if (isNow) { label = 'On duty now'; sub = 'You\'re clocked in for this shift'; }
    else if (focus._date.toDateString() === now.toDateString()) { label = 'Today\'s duty'; sub = 'Starts later today'; }
    else { label = 'Next duty'; sub = nextDayLabel(focus._date); }

    const startTimeStr = `${focus.shift_type.start_time}`;
    const endTimeStr = `${focus.shift_type.end_time}`;
    const countdownEl = el('div', { class: 'duty-hero-count' });
    const updateCountdown = () => {
      const t = Date.now();
      let target, prefix;
      if (t < startMs) { target = startMs - t; prefix = 'starts in'; }
      else if (t <= endMs) { target = endMs - t; prefix = 'ends in'; }
      else { countdownEl.textContent = ''; return; }
      const h = Math.floor(target / 3.6e6);
      const m = Math.floor((target % 3.6e6) / 6e4);
      countdownEl.innerHTML = `<span class="lab">${prefix}</span> <span class="val">${h}h ${String(m).padStart(2,'0')}m</span>`;
    };
    updateCountdown();
    if (focus._countdownInterval) clearInterval(focus._countdownInterval);
    focus._countdownInterval = setInterval(updateCountdown, 30000);

    const actions = el('div', { class: 'duty-hero-actions' });
    if (isNow) {
      actions.append(el('button', { class: 'hero-btn primary', onclick: () => clockOut(focus.id) }, 'Clock out'));
    } else {
      actions.append(el('button', { class: 'hero-btn primary', onclick: () => clockIn(focus.id) }, 'Clock in'));
    }
    actions.append(el('button', { class: 'hero-btn ghost-on-accent', onclick: () => requestSwap(focus.id) }, 'Request swap'));

    hero.append(
      el('div', { class: 'duty-hero-top' },
        el('div', { class: 'duty-hero-eyebrow' },
          el('span', { class: 'pulse-dot ' + (isNow ? 'live' : '') }),
          label,
        ),
        focus.is_night ? el('span', { class: 'night-tag' }, svgIcon('moon'), ' Night') : null,
      ),
      el('div', { class: 'duty-hero-time' },
        el('span', { class: 'big' }, startTimeStr),
        el('span', { class: 'sep' }, '→'),
        el('span', { class: 'big' }, endTimeStr),
      ),
      el('div', { class: 'duty-hero-shift' }, focus.shift_type.name, el('span', { class: 'sep-mid' }, '·'), niceDate(focus._date)),
      countdownEl,
      el('div', { class: 'duty-hero-sub' }, sub),
      actions,
      branch ? el('div', { class: 'duty-hero-branch' }, BranchLogo(branch, 22), branch.name) : null,
    );
  } else {
    hero.classList.add('empty');
    hero.append(
      el('div', { class: 'duty-hero-eyebrow' }, 'No upcoming duty'),
      el('div', { class: 'duty-hero-shift', style: 'margin-top:8px' }, 'Enjoy your day off'),
      el('div', { class: 'duty-hero-sub' }, 'Your next roster will appear here as soon as it\'s published.'),
    );
  }
  root.append(hero);

  // Quick stats row (this week)
  const weekStart = mondayOf(now);
  const weekEnd = new Date(weekStart); weekEnd.setDate(weekEnd.getDate() + 7);
  const weekDuties = enriched.filter(d => d._date >= weekStart && d._date < weekEnd);
  const weekHours = weekDuties.reduce((s, d) => s + (d._end - d._start) / 3.6e6, 0);
  const stats = el('div', { class: 'staff-stats' });
  stats.append(
    el('div', { class: 'staff-stat' }, el('div', { class: 'sv' }, weekDuties.length), el('div', { class: 'sl' }, 'shifts this week')),
    el('div', { class: 'staff-stat' }, el('div', { class: 'sv' }, weekHours.toFixed(0)), el('div', { class: 'sl' }, 'hours scheduled')),
    el('div', { class: 'staff-stat' }, el('div', { class: 'sv' }, enriched.length), el('div', { class: 'sl' }, 'upcoming total')),
  );
  root.append(stats);

  // Upcoming list (excluding the one in hero)
  const rest = enriched.filter(d => d.id !== focus?.id).slice(0, 12);
  if (rest.length) {
    const card = el('div', { class: 'card' });
    card.append(el('div', { class: 'card-head' }, el('h3', {}, 'Upcoming shifts'), el('span', { class: 'small' }, `${rest.length}`)));
    const list = el('div', { class: 'shift-list' });
    rest.forEach(d => {
      const row = el('div', { class: 'shift-row', onclick: () => requestSwap(d.id) });
      const dateChip = el('div', { class: 'shift-date' },
        el('div', { class: 'dow' }, ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d._date.getDay()]),
        el('div', { class: 'day' }, d._date.getDate()),
      );
      row.append(dateChip,
        el('div', { class: 'shift-info' },
          el('div', { class: 'sname' }, d.shift_type.name, d.is_night ? el('span', { style: 'margin-left:6px;color:var(--muted)' }, svgIcon('moon')) : null),
          el('div', { class: 'stime' }, `${d.shift_type.start_time} – ${d.shift_type.end_time}`),
        ),
        el('div', { class: 'shift-go' }, '›'),
      );
      list.append(row);
    });
    card.append(list);
    root.append(card);
  }

  return root;
}

function nextDayLabel(d) {
  const now = new Date();
  const diffDays = Math.round((d - new Date(now.toDateString())) / 864e5);
  if (diffDays === 0) return 'Today';
  if (diffDays === 1) return 'Tomorrow';
  if (diffDays < 7) return `In ${diffDays} days`;
  return niceDate(d);
}
async function clockIn(duty_id) { try { const a = await api('/attendance/clock-in', { method: 'POST', body: { duty_id } }); showSuccess('Clocked in' + (a.late_minutes ? ` (${a.late_minutes}m late)` : '')); } catch(e){ showError(e.message);} }
async function clockOut(duty_id) { try { const a = await api('/attendance/clock-out', { method: 'POST', body: { duty_id } }); showSuccess('Clocked out' + (a.overtime_hours ? ` · OT ${a.overtime_hours.toFixed(1)}h` : '')); } catch(e){ showError(e.message);} }
async function requestSwap(duty_id) {
  const peers = await api('/staff?branch_id=' + State.user.branch_id);
  const m = el('div', { class: 'modal' }, el('h3', {}, 'Request swap'), el('p', { class: 'sub' }, 'Pick a colleague and add a brief reason.'));
  const sel = el('select');
  peers.filter(p => p.id !== State.user.staff_id).forEach(p => sel.append(el('option', { value: p.id }, p.full_name)));
  const reason = el('textarea', { rows: 2, placeholder: 'Why do you need cover?' });
  m.append(el('label', {}, 'Swap with'), sel, el('label', {}, 'Reason'), reason);
  const send = el('button', { class: 'accent' }, 'Send request');
  send.onclick = async () => {
    try { await api('/swaps', { method: 'POST', body: { from_duty_id: duty_id, receiver_staff_id: sel.value, reason: reason.value } }); closeModal(); render(); }
    catch (e) { showError(e.message); }
  };
  m.append(el('div', { class: 'actions' }, el('button', { class: 'secondary', onclick: closeModal }, 'Cancel'), send));
  showModal(m);
}

async function PageMyAttendance() {
  const root = el('div', { class: 'fade-in' });
  root.append(SectionHead('Your record', 'My attendance', 'Personal punctuality and overtime summary for this month.'));
  const j = await api('/attendance/me/summary');
  const card = el('div', { class: 'card' });
  card.append(el('div', { class: 'card-head' }, el('h3', {}, `${j.month || ''}/${j.year || ''}`), el('span', { class: 'small' }, `${j.summary?.total || 0} records`)));
  const grid = el('div', { class: 'grid cols-4' });
  if (!Object.keys(j.summary || {}).length) {
    card.append(el('div', { class: 'empty' }, 'No attendance records this month'));
  } else {
    Object.entries(j.summary || {}).forEach(([k,v]) => {
      grid.append(el('div', { class: 'card tight' }, el('div', { class: 'kpi-card' },
        el('div', { class: 'kpi accent' }, typeof v === 'number' ? (Number.isInteger(v) ? v : v.toFixed(1)) : v),
        el('div', { class: 'kpi-label' }, k.replace('_', ' ')))));
    });
    card.append(grid);
  }
  root.append(card);
  return root;
}

/* -------------------- Render -------------------- */
const PAGES = {
  dashboard: PageDashboard,
  branches: PageBranches,
  staff: PageStaff,
  shifts: PageShifts,
  roster: PageRoster,
  swaps: PageSwaps,
  audit: PageAudit,
  'my-roster': PageMyRoster,
  'my-swaps': PageSwaps,
};

async function render() {
  const app = $('app');
  app.innerHTML = '';
  if (!State.token) { app.append(LoginView()); return; }
  if (!State.user) { try { await loadBootstrap(); } catch { logout(); return; } }
  if (!State.user) { app.append(LoginView()); return; }

  app.append(Header(), Nav());
  const main = el('main');
  app.append(main);
  main.append(el('div', { class: 'center-loader' }, el('span', { class: 'spinner' })));

  const fn = PAGES[State.page] || PAGES[NAV_BY_ROLE[State.user.role][0]];
  try {
    const view = await fn();
    main.innerHTML = '';
    main.append(view);
    enrichTablesForMobile(main);
  } catch (e) {
    main.innerHTML = '';
    main.append(el('div', { class: 'card' }, el('div', { class: 'err' }, 'Error: ' + e.message)));
  }

  if (State.modal) app.append(el('div', { class: 'modal-bg', onclick: (e) => { if (e.target.className === 'modal-bg') closeModal(); } }, State.modal));
}

(async () => {
  if (State.token) { try { await loadBootstrap(); } catch {} }
  if (State.user) State.page = NAV_BY_ROLE[State.user.role][0];
  render();
})();
